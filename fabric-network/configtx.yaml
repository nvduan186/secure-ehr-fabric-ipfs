Organizations:
  - &OrdererOrg
    Name: OrdererOrg
    ID: OrdererMSP
    MSPDir: /home/nguye/.openclaw/workspace-thesis-lead/demo/fabric-network/organizations/ordererOrganizations/ehr.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"
    OrdererEndpoints:
      - orderer.ehr.com:7050

  - &HospitalA
    Name: HospitalAMSP
    ID: HospitalAMSP
    MSPDir: /home/nguye/.openclaw/workspace-thesis-lead/demo/fabric-network/organizations/peerOrganizations/hospitala.ehr.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('HospitalAMSP.admin', 'HospitalAMSP.peer', 'HospitalAMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('HospitalAMSP.admin', 'HospitalAMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('HospitalAMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('HospitalAMSP.peer')"
    AnchorPeers:
      - Host: peer0.hospitala.ehr.com
        Port: 7051

  - &HospitalB
    Name: HospitalBMSP
    ID: HospitalBMSP
    MSPDir: /home/nguye/.openclaw/workspace-thesis-lead/demo/fabric-network/organizations/peerOrganizations/hospitalb.ehr.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('HospitalBMSP.admin', 'HospitalBMSP.peer', 'HospitalBMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('HospitalBMSP.admin', 'HospitalBMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('HospitalBMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('HospitalBMSP.peer')"
    AnchorPeers:
      - Host: peer0.hospitalb.ehr.com
        Port: 9051

Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_5: true

Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    Endorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
  Capabilities:
    <<: *ApplicationCapabilities

Orderer: &OrdererDefaults
  OrdererType: etcdraft
  Addresses:
    - orderer.ehr.com:7050
  EtcdRaft:
    Consenters:
      - Host: orderer.ehr.com
        Port: 7050
        ClientTLSCert: /home/nguye/.openclaw/workspace-thesis-lead/demo/fabric-network/organizations/ordererOrganizations/ehr.com/orderers/orderer.ehr.com/tls/server.crt
        ServerTLSCert: /home/nguye/.openclaw/workspace-thesis-lead/demo/fabric-network/organizations/ordererOrganizations/ehr.com/orderers/orderer.ehr.com/tls/server.crt
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"
  Capabilities:
    <<: *OrdererCapabilities

Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
  Capabilities:
    <<: *ChannelCapabilities

Profiles:
  EHRGenesis:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
      Capabilities: *OrdererCapabilities
    Consortiums:
      EHRConsortium:
        Organizations:
          - *HospitalA
          - *HospitalB
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *HospitalA
        - *HospitalB
      Capabilities: *ApplicationCapabilities
  EHRChannel:
    <<: *ChannelDefaults
    Consortium: EHRConsortium
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
      Capabilities: *OrdererCapabilities
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *HospitalA
        - *HospitalB
      Capabilities: *ApplicationCapabilities
